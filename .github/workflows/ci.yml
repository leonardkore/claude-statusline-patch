name: ci

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - refactor/**
      - docs/**
      - chore/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: go test
        run: go test ./...
      - name: go vet
        run: go vet ./...
