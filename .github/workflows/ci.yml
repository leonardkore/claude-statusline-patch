name: ci

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - refactor/**
      - docs/**
      - chore/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: go test
        run: go test ./...
      - name: go vet
        run: go vet ./...
